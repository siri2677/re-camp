# Re:Camp의 일반 개발 세션에서는 Unity MCP만 사용한다.
# 이 프로젝트가 trusted 상태일 때 사용자 전역 설정보다 우선 적용된다.

[mcp_servers.context7]
enabled = false

[mcp_servers.notionApi]
enabled = false

[mcp_servers.github]
enabled = false

[mcp_servers.filesystem]
enabled = false

[mcp_servers.sequentialthinking]
enabled = false

[mcp_servers.node_repl]
enabled = false

[mcp_servers.unityMCP]
enabled = true
enabled_tools = [
  "batch_execute",
  "debug_request_context",
  "set_active_instance",
  "manage_tools",
  "refresh_unity",
  "read_console",
  "manage_editor",
  "manage_scene",
  "find_gameobjects",
  "manage_gameobject",
  "manage_components",
  "manage_asset",
  "manage_camera",
  "execute_code",
  "validate_script",
  "run_tests",
  "get_test_job",
]
