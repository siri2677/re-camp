<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 3840 2160">
  <defs>
    <style>
      .bg { fill:#0e171a; }
      .board { fill:#172327; stroke:#36585a; stroke-width:3; }
      .panel { fill:#223439; stroke:#42696a; stroke-width:2; }
      .slot { fill:#17272b; stroke:#6d9b97; stroke-width:2; stroke-dasharray:12 10; }
      .mint { fill:#69d8bd; }
      .coral { fill:#ef857a; }
      .amber { fill:#e9b44c; }
      .txt { fill:#f2f0e9; font-family:Arial,'Noto Sans KR',sans-serif; }
      .sub { fill:#afc1bd; font-family:Arial,'Noto Sans KR',sans-serif; }
      .tiny { font-size:19px; }
      .small { font-size:23px; }
      .body { font-size:27px; }
      .title { font-size:38px; font-weight:700; }
      .hero { font-size:52px; font-weight:700; }
      .center { text-anchor:middle; dominant-baseline:middle; }
      .guide { stroke:#95b9b4; stroke-width:2; stroke-dasharray:8 8; opacity:.55; }
      .chip { stroke:#d8e4df; stroke-width:2; }
    </style>
  </defs>

  <rect class="bg" width="3840" height="2160"/>
  <text class="txt hero" x="48" y="66">Re:Camp Character Production Sheet — REVIEW TEMPLATE v002</text>
  <text class="sub body" x="3792" y="62" text-anchor="end">2D ~7 HEAD KEY ART · 3D 5–6 HEAD TRANSLATION · HUMAN APPROVAL PENDING</text>

  <!-- FRAME 01 -->
  <g id="FRAME_01_Identity_KeyArt" transform="translate(40 100)">
    <rect class="board" width="1200" height="920" rx="20"/>
    <rect class="mint" width="1200" height="74" rx="20"/>
    <text class="txt title" x="28" y="50" fill="#102023">01 · IDENTITY / KEY ART</text>
    <text class="txt small" x="1172" y="48" text-anchor="end" fill="#102023">STATUS: REVIEW</text>
    <rect class="panel" x="26" y="94" width="1148" height="92" rx="12"/>
    <text class="txt small" x="48" y="126">ID: CH___  NAME: ______  SHEET: v___  OWNER: ______  UPDATED: ______</text>
    <text class="sub tiny" x="48" y="158">2D Target: __.__ heads · 3D Target: __.__ heads · Bible v2.0 · Anchor v2.0</text>
    <rect class="slot" x="28" y="210" width="550" height="634" rx="14"/>
    <text class="sub body center" x="303" y="500">~7 HEAD FULL BODY / KEY ART</text>
    <text class="sub small center" x="303" y="540">head and feet visible · adult anime proportion</text>
    <line class="guide" x1="52" y1="800" x2="554" y2="800"/>
    <rect class="panel" x="602" y="210" width="572" height="170" rx="14"/>
    <text class="txt body" x="626" y="248">ONE-LINE VISUAL HOOK</text>
    <text class="sub small" x="626" y="292">________________________________</text>
    <text class="sub tiny" x="626" y="334">Role / calm-state / mission-state keywords</text>
    <rect class="panel" x="602" y="400" width="572" height="212" rx="14"/>
    <text class="txt body" x="626" y="438">ANCHOR SUMMARY</text>
    <text class="sub small" x="626" y="480">Signature 1: ___________________</text>
    <text class="sub small" x="626" y="518">Secondary 1: ___________________</text>
    <text class="sub small" x="626" y="556">Secondary 2: ___________________</text>
    <text class="sub tiny" x="626" y="590">LOCKED / CONTROLLED / FORBIDDEN IDs</text>
    <rect class="panel" x="602" y="632" width="572" height="212" rx="14"/>
    <text class="txt body" x="626" y="670">SOURCE / SIMILARITY RISK</text>
    <text class="sub tiny" x="626" y="710">Bible / Anchor / Metadata / Review paths</text>
    <text class="coral small" x="626" y="756">Do not use v003 as approved art.</text>
    <text class="sub tiny" x="626" y="804">External-IP similarity / mitigation: __________</text>
  </g>

  <!-- FRAME 02 -->
  <g id="FRAME_02_Turnaround" transform="translate(1320 100)">
    <rect class="board" width="1200" height="920" rx="20"/>
    <rect class="mint" width="1200" height="74" rx="20"/>
    <text class="txt title" x="28" y="50" fill="#102023">02 · ~7 HEAD TURNAROUND</text>
    <text class="txt small" x="1172" y="48" text-anchor="end" fill="#102023">REFERENCE ≠ APPROVAL</text>
    <rect class="panel" x="26" y="94" width="1148" height="72" rx="12"/>
    <text class="sub small" x="48" y="136">Same scale · head-unit guides · baseline · asymmetry · equipment orientation fixed</text>
    <g transform="translate(28 190)">
      <rect class="slot" width="350" height="600" rx="14"/>
      <rect class="slot" x="382" width="350" height="600" rx="14"/>
      <rect class="slot" x="764" width="350" height="600" rx="14"/>
      <text class="txt body center" x="175" y="40">FRONT</text>
      <text class="txt body center" x="557" y="40">SIDE</text>
      <text class="txt body center" x="939" y="40">BACK</text>
      <line class="guide" x1="18" y1="550" x2="1096" y2="550"/>
      <line class="guide" x1="175" y1="70" x2="175" y2="566"/>
      <line class="guide" x1="557" y1="70" x2="557" y2="566"/>
      <line class="guide" x1="939" y1="70" x2="939" y2="566"/>
      <text class="sub small center" x="175" y="314">2D TARGET</text>
      <text class="sub small center" x="557" y="314">6.8–7.4 HEAD</text>
      <text class="sub small center" x="939" y="314">STRUCTURE</text>
    </g>
    <rect class="panel" x="28" y="812" width="1114" height="80" rx="12"/>
    <text class="sub tiny" x="50" y="846">Height / head units / equipment ratio / asymmetry: ________________________________________</text>
    <text class="sub tiny" x="50" y="876">AI side/back: REFERENCE ONLY · human structural corrections required</text>
  </g>

  <!-- FRAME 03 -->
  <g id="FRAME_03_Face_Expressions" transform="translate(2600 100)">
    <rect class="board" width="1200" height="920" rx="20"/>
    <rect class="mint" width="1200" height="74" rx="20"/>
    <text class="txt title" x="28" y="50" fill="#102023">03 · FACE / EXPRESSIONS</text>
    <rect class="slot" x="28" y="100" width="430" height="430" rx="14"/>
    <text class="sub body center" x="243" y="286">FACE ANCHOR</text>
    <text class="sub small center" x="243" y="326">front + 3/4 · eye / jaw / makeup / hairline</text>
    <g transform="translate(486 100)">
      <rect class="slot" width="158" height="188" rx="10"/><rect class="slot" x="176" width="158" height="188" rx="10"/>
      <rect class="slot" x="352" width="158" height="188" rx="10"/><rect class="slot" x="528" width="158" height="188" rx="10"/>
      <rect class="slot" y="212" width="158" height="188" rx="10"/><rect class="slot" x="176" y="212" width="158" height="188" rx="10"/>
      <rect class="slot" x="352" y="212" width="158" height="188" rx="10"/><rect class="slot" x="528" y="212" width="158" height="188" rx="10"/>
      <text class="sub tiny center" x="79" y="166">BASE</text><text class="sub tiny center" x="255" y="166">SMILE</text>
      <text class="sub tiny center" x="431" y="166">CHARM</text><text class="sub tiny center" x="607" y="166">SURPRISE</text>
      <text class="sub tiny center" x="79" y="378">MISSION</text><text class="sub tiny center" x="255" y="378">ANGER</text>
      <text class="sub tiny center" x="431" y="378">SAD</text><text class="sub tiny center" x="607" y="378">EMBARRASSED</text>
    </g>
    <rect class="panel" x="28" y="556" width="1118" height="142" rx="14"/>
    <text class="txt body" x="50" y="594">FACE / CONTRAST NOTES</text>
    <text class="sub small" x="50" y="632">Eye ___  Brow ___  Jaw ___  Mouth ___  Makeup ___</text>
    <text class="sub small" x="50" y="668">Calm ↔ mission contrast: ______________________________________________</text>
    <rect class="slot" x="28" y="720" width="1118" height="168" rx="14"/>
    <text class="sub body center" x="587" y="786">128px FACE STRIP · FIVE-CHARACTER COMPARISON</text>
    <text class="sub small center" x="587" y="830">actual 128px export required for Gate A evidence</text>
  </g>

  <!-- FRAME 04 -->
  <g id="FRAME_04_Outfit_Equipment" transform="translate(40 1120)">
    <rect class="board" width="1200" height="920" rx="20"/>
    <rect class="coral" width="1200" height="74" rx="20"/>
    <text class="txt title" x="28" y="50" fill="#291717">04 · FASHION / EQUIPMENT</text>
    <rect class="slot" x="28" y="100" width="500" height="500" rx="14"/>
    <text class="sub body center" x="278" y="320">OUTFIT LAYER BREAKDOWN</text>
    <text class="sub small center" x="278" y="360">fashion + function + repairs + joints</text>
    <rect class="slot" x="552" y="100" width="594" height="238" rx="14"/>
    <text class="sub body center" x="849" y="200">SIGNATURE EQUIPMENT</text>
    <text class="sub small center" x="849" y="240">handle · fold · open · emission · effect origin</text>
    <rect class="slot" x="552" y="362" width="594" height="238" rx="14"/>
    <text class="sub body center" x="849" y="460">SECONDARY EQUIPMENT / PROP</text>
    <rect class="panel" x="28" y="626" width="1118" height="262" rx="14"/>
    <text class="txt body" x="50" y="664">FUNCTION / SOCKET / COLLISION NOTES</text>
    <text class="sub small" x="50" y="706">Why this fashion layer exists: ________________________________________</text>
    <text class="sub small" x="50" y="748">Sockets: Weapon · BladeTip · Muzzle · Scanner · Drone · Shield · VFXCenter</text>
    <text class="sub small" x="50" y="790">Attach / detach / fold states and joint risks: _________________________</text>
    <text class="coral small" x="50" y="838">Cross-character or external-IP similarity risk: ________________________</text>
  </g>

  <!-- FRAME 05 -->
  <g id="FRAME_05_Palette_Materials_3DTranslation" transform="translate(1320 1120)">
    <rect class="board" width="1200" height="920" rx="20"/>
    <rect class="coral" width="1200" height="74" rx="20"/>
    <text class="txt title" x="28" y="50" fill="#291717">05 · PALETTE / 2D→3D TRANSLATION</text>
    <text class="txt small" x="1172" y="48" text-anchor="end" fill="#291717">2D ~7 HEAD → 3D 5–6 HEAD</text>
    <g transform="translate(28 108)">
      <rect class="chip" fill="#69d8bd" width="130" height="94" rx="10"/>
      <rect class="chip" fill="#f2ead9" x="150" width="130" height="94" rx="10"/>
      <rect class="chip" fill="#ef857a" x="300" width="130" height="94" rx="10"/>
      <rect class="chip" fill="#d7a27e" x="450" width="130" height="94" rx="10"/>
      <rect class="chip" fill="#6d4b45" x="600" width="130" height="94" rx="10"/>
      <rect class="chip" fill="#7fc5d8" x="750" width="130" height="94" rx="10"/>
      <rect class="chip" fill="#202b34" x="900" width="130" height="94" rx="10"/>
      <text class="sub tiny" x="0" y="124">Primary</text><text class="sub tiny" x="150" y="124">Secondary</text>
      <text class="sub tiny" x="300" y="124">Accent</text><text class="sub tiny" x="450" y="124">Skin</text>
      <text class="sub tiny" x="600" y="124">Hair</text><text class="sub tiny" x="750" y="124">Eye/FX</text>
      <text class="sub tiny" x="900" y="124">Neutral</text>
    </g>
    <rect class="panel" x="28" y="272" width="1118" height="206" rx="14"/>
    <text class="txt body" x="50" y="310">MATERIAL SLOT PLAN</text>
    <text class="sub small" x="50" y="352">Face ___ Eye ___ Hair ___ Outfit ___ Equipment ___ Emission ___</text>
    <text class="sub small" x="50" y="394">Surface / roughness / outline / common camp material notes</text>
    <text class="sub small" x="50" y="436">Low-saturation luminance separation: _________________________________</text>
    <rect class="panel" x="28" y="504" width="1118" height="384" rx="14"/>
    <text class="txt body" x="50" y="544">2D ~7 HEAD → 3D 5–6 HEAD TRANSLATION</text>
    <text class="sub small" x="50" y="590">2D target: ____ heads   3D target: ____ heads</text>
    <text class="sub small" x="50" y="634">Enlarge / preserve: face · hair mass · hands · feet · signature equipment</text>
    <text class="sub small" x="50" y="678">Remove micro-details: ________________________________________________</text>
    <text class="sub small" x="50" y="722">Merge layers / shorten hair or cloth: _________________________________</text>
    <text class="sub small" x="50" y="766">Rig / joint / clipping / camera risks: _________________________________</text>
    <text class="amber small" x="50" y="814">Poly / Texture / Bone / LOD budgets: TBD until CHARACTER_3D_SPEC</text>
    <text class="sub tiny" x="50" y="854">3D is a gameplay translation, not a simple scaled-down copy of the 2D illustration.</text>
  </g>

  <!-- FRAME 06 -->
  <g id="FRAME_06_Gate_Evidence_Approval" transform="translate(2600 1120)">
    <rect class="board" width="1200" height="920" rx="20"/>
    <rect class="amber" width="1200" height="74" rx="20"/>
    <text class="txt title" x="28" y="50" fill="#2b220f">06 · GATE EVIDENCE / APPROVAL</text>
    <rect class="slot" x="28" y="100" width="350" height="260" rx="14"/>
    <text class="sub small center" x="203" y="212">SILHOUETTE</text>
    <text class="sub tiny center" x="203" y="246">gear on / off · 5/5 blind test</text>
    <rect class="slot" x="402" y="100" width="350" height="260" rx="14"/>
    <text class="sub small center" x="577" y="212">128px FACE</text>
    <text class="sub tiny center" x="577" y="246">five-character strip</text>
    <rect class="slot" x="776" y="100" width="370" height="260" rx="14"/>
    <text class="sub small center" x="961" y="212">LOW-SAT / SIMILARITY</text>
    <text class="sub tiny center" x="961" y="246">color vision · external-IP review</text>
    <rect class="panel" x="28" y="386" width="560" height="302" rx="14"/>
    <text class="txt body" x="50" y="424">GATE A / B CHECKS</text>
    <text class="sub small" x="50" y="464">CHA-A01–A16: ___________________</text>
    <text class="sub small" x="50" y="504">CHA-B01–B10: ___________________</text>
    <text class="sub small" x="50" y="544">One-line hook reads: ___________</text>
    <text class="coral small" x="50" y="594">Blocking changes: ______________</text>
    <text class="sub tiny" x="50" y="636">Evidence links / retest scope required</text>
    <rect class="panel" x="612" y="386" width="534" height="302" rx="14"/>
    <text class="txt body" x="636" y="424">REVIEW RESULT</text>
    <text class="sub small" x="636" y="468">Decision: PASS / CONDITIONAL / FAIL</text>
    <text class="sub small" x="636" y="510">Reviewer: __________________________</text>
    <text class="sub small" x="636" y="552">Date: __________  Scope: __________</text>
    <text class="sub small" x="636" y="594">Retest: ____________________________</text>
    <text class="amber small" x="636" y="644">HUMAN APPROVAL: PENDING</text>
    <rect class="panel" x="28" y="714" width="1118" height="174" rx="14"/>
    <text class="txt body" x="50" y="752">EXPORT / AUDIT</text>
    <text class="sub small" x="50" y="794">PNG/PDF path: __________________  Metadata: __________________________</text>
    <text class="sub small" x="50" y="834">File status/version matches header: ___  LFS: ___  Rights evidence: ___</text>
    <text class="coral tiny" x="50" y="868">Any FAIL blocks approval. CONDITIONAL / NOT TESTED requires explicit retest.</text>
  </g>
</svg>
